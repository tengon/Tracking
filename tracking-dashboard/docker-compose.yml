services:
  # ─────────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: tracking_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: bitauto123
      POSTGRES_DB: tracking_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Init SQL scripts — dijalankan sekali saat volume kosong
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tracking_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────────
  # Next.js Dashboard App
  # ─────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tracking_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # TrackSolid API
      JIMI_BASE_URL: ${JIMI_BASE_URL}
      JIMI_APP_KEY: ${JIMI_APP_KEY}
      JIMI_APP_SECRET: ${JIMI_APP_SECRET}
      JIMI_ACCOUNT: ${JIMI_ACCOUNT}
      JIMI_PASSWORD_MD5: ${JIMI_PASSWORD_MD5}
      # Auth
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      # Database — pakai hostname service "postgres"
      DATABASE_URL: postgresql://postgres:bitauto123@postgres:5432/tracking_db
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # SQLite data persisten
      - sqlite_data:/app/data
      # Log file persisten
      - logs_data:/app/logs

  # ─────────────────────────────────────────────
  # DB Restore (hanya jalan sekali, saat restore data)
  # Jalankan manual: docker compose run --rm db-restore
  # ─────────────────────────────────────────────
  db-restore:
    image: postgres:16-alpine
    container_name: tracking_db_restore
    profiles:
      - restore
    environment:
      PGPASSWORD: bitauto123
    volumes:
      - ./docker/backup.dump:/backup/backup.dump:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      pg_restore
        -h postgres
        -U postgres
        -d tracking_db
        --clean
        --if-exists
        -v
        /backup/backup.dump
    networks:
      - default

volumes:
  postgres_data:
  sqlite_data:
  logs_data:
